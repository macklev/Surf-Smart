<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surf Smart Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="parents.html">Resources for Parents</a></li>
                <li><a href="games.html">Games</a></li>
            </ul>
        </nav>
    </header>

    <main class="page game-hub">
        <h1>Surf Smart Games</h1>
        <p class="game-text">Choose one game to play.</p>

        <div class="card-container game-card-container">
            <div class="card game-card">
                <div class="container">
                    <h2 class="cardh2"><b>Quiz Game</b></h2>
                    <p class="game-text">Answer quick internet safety questions.</p>
                    <a class="game-link" href="quizGame/quiz.html">Play</a>
                </div>
            </div>

            <div class="card game-card">
                <div class="container">
                    <h2 class="cardh2"><b>Treasure Checker</b></h2>
                    <p class="game-text">Drag actions into safe, careful, or dangerous.</p>
                    <a class="game-link" href="treasureChecker/dragAndDrop.html">Play</a>
                </div>
            </div>

            <div class="card game-card">
                <div class="container">
                    <h2 class="cardh2"><b>Who Should You Tell?</b></h2>
                    <p class="game-text">Pick the trusted person to tell.</p>
                    <a class="game-link" href="whoToTell/whoToTell.html">Play</a>
                </div>
            </div>
        </div>
    </main>
